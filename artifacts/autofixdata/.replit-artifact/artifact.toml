kind = "web"
previewPath = "/"
title = "Auto Fix Data"
version = "1.0.0"
id = "artifacts/autofixdata"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24520
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/autofixdata run dev"

[services.env]
PORT = "24520"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/autofixdata", "run", "build"]
publicDir = "artifacts/autofixdata/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
