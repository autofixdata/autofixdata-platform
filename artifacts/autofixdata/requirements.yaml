    aspect_ratio: "16:9"
  - path: "artifacts/autofixdata/public/images/diagnostics-abstract.png"
    description: "Abstract futuristic interface showing automotive diagnostic codes and engine wireframe in dark navy with bright yellow accents, highly technical, shallow depth of field."
