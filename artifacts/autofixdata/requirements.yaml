packages:
  "framer-motion": "For premium page transitions, scroll animations, and SaaS-feel micro-interactions"
  "react-helmet-async": "Required for managing SEO meta tags, titles, and JSON-LD schemas across all pages"
  "lucide-react": "For consistent, professional iconography throughout the application"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For merging Tailwind CSS classes cleanly"

